<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat Streaming · 12 animations grid · SMC</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
.wrap { max-width: 1280px; margin: 0 auto; padding: 28px 32px; }
header { padding-bottom: 18px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 24px; display:flex; align-items:baseline; gap: 18px; flex-wrap: wrap; }
header .back { font:11px var(--font-mono); color: var(--fg-3); text-decoration:none; }
header h1 { margin:0; font:600 28px var(--font-sans); letter-spacing:-0.02em; }
header .meta { font:11px var(--font-mono); color: var(--fg-3); margin-left:auto; }

.playground {
  display:grid; grid-template-columns: 1fr 320px; gap: 0;
  background: var(--bg-elevated); border:1px solid var(--border-subtle);
  border-radius: var(--radius-md); overflow:hidden;
  min-height: 640px;
}
.stage {
  padding: 24px; background: var(--smc-cream-100);
  display:grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); gap: 12px;
}

.chat-cell {
  background: var(--bg-elevated); border:1px solid var(--border-subtle); border-radius: var(--radius-md);
  padding: 14px; display:flex; flex-direction:column; gap: 8px; min-height: 180px;
  overflow:hidden; position:relative;
  font-family: var(--font-sans);
}
.chat-cell .label {
  font:600 9px var(--font-mono); letter-spacing:.14em; text-transform:uppercase;
  color: var(--fg-3); display:flex; justify-content:space-between;
}
.chat-cell .label .ix { color: var(--smc-gold-500); }

.msg-user {
  align-self:flex-end; max-width: 80%;
  background: var(--smc-navy-500); color: var(--smc-cream);
  padding: 6px 10px; border-radius: 12px 12px 4px 12px;
  font: 12px var(--font-sans); line-height: 1.4;
}
.msg-ai {
  align-self:flex-start; max-width: 90%;
  font: 12.5px var(--font-sans); line-height: 1.4; color: var(--fg-1);
  white-space: pre-wrap;
  min-height: 24px;
}

/* ============================================================
   12 ANIMATIONS · cada chat-cell tiene un modo
   ============================================================ */

/* 1. char-pop: cada char aparece con scale-up */
.anim-char-pop .ch {
  display:inline-block; opacity:0; transform: scale(0.3);
  animation: char-pop-kf .35s var(--ease-spring) forwards;
}
@keyframes char-pop-kf {
  0% { opacity:0; transform: scale(0.3); }
  60% { opacity:1; transform: scale(1.15); }
  100% { opacity:1; transform: scale(1); }
}

/* 2. weight-in: peso tipográfico crece */
.anim-weight-in .ch {
  display:inline-block; opacity:0;
  font-weight: 100;
  animation: weight-in-kf .5s var(--ease-out) forwards;
}
@keyframes weight-in-kf {
  to { opacity: 1; font-weight: 700; }
}

/* 3. fade: aparición simple */
.anim-fade .ch {
  display:inline-block; opacity:0;
  animation: fade-kf .25s ease-out forwards;
}
@keyframes fade-kf { to { opacity:1; } }

/* 4. typewriter: cursor parpadeante + clip-path */
.anim-typewriter .typed {
  display: inline-block;
  overflow: hidden;
  white-space: nowrap;
  border-right: 2px solid var(--smc-accent-500);
  animation: blink 0.7s infinite;
  width: var(--typed-w, 0);
}
@keyframes blink { 50% { border-color: transparent; } }

/* 5. blur-in */
.anim-blur-in .ch {
  display:inline-block; opacity:0; filter: blur(8px);
  animation: blur-in-kf .4s ease-out forwards;
}
@keyframes blur-in-kf { to { opacity:1; filter: blur(0); } }

/* 6. slide-up */
.anim-slide-up .ch {
  display:inline-block; opacity:0; transform: translateY(8px);
  animation: slide-up-kf .3s var(--ease-out) forwards;
}
@keyframes slide-up-kf { to { opacity:1; transform: translateY(0); } }

/* 7. wave */
.anim-wave .ch {
  display:inline-block; opacity:0; transform: translateY(6px);
  animation: wave-kf .4s var(--ease-spring) forwards;
}
@keyframes wave-kf {
  0% { opacity:0; transform: translateY(8px) rotate(-3deg); }
  60% { opacity:1; transform: translateY(-3px) rotate(2deg); }
  100% { opacity:1; transform: translateY(0) rotate(0); }
}

/* 8. glitch */
.anim-glitch .ch {
  display:inline-block; opacity:0;
  animation: glitch-kf .25s steps(3) forwards;
}
@keyframes glitch-kf {
  0% { opacity:0; transform: translate(2px, -1px); color: #D9483A; }
  33% { opacity:.5; transform: translate(-2px, 1px); color: var(--smc-accent-500); }
  66% { opacity:.7; transform: translate(1px, 0); color: var(--smc-navy-500); }
  100% { opacity:1; transform: translate(0); color: var(--fg-1); }
}

/* 9. gradient-shift */
.anim-gradient .ch {
  display:inline-block; opacity:0;
  background: linear-gradient(90deg, var(--smc-navy-500), var(--smc-accent-500), var(--smc-gold-500));
  background-size: 200% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: grad-shift .4s ease-out forwards, grad-anim 3s linear infinite;
}
@keyframes grad-shift { to { opacity:1; } }
@keyframes grad-anim { to { background-position: 200% 0; } }

/* 10. scale-bounce */
.anim-bounce .ch {
  display:inline-block; opacity:0; transform: scale(0);
  animation: bounce-kf .45s cubic-bezier(.34,1.7,.64,1) forwards;
}
@keyframes bounce-kf { to { opacity:1; transform: scale(1); } }

/* 11. flip-y */
.anim-flip-y .ch {
  display:inline-block; opacity:0; transform: rotateY(90deg);
  animation: flip-y-kf .35s ease-out forwards;
}
@keyframes flip-y-kf { to { opacity:1; transform: rotateY(0); } }

/* 12. expand-from-center */
.anim-expand .ch {
  display:inline-block; opacity:0; transform: scaleX(0.1);
  animation: expand-kf .3s var(--ease-out) forwards;
}
@keyframes expand-kf { to { opacity:1; transform: scaleX(1); } }

.controls {
  background: var(--bg-sunk); padding: 20px; border-left:1px solid var(--border-subtle);
  display:flex; flex-direction:column; gap: 18px;
}
.ctrl-label { font:600 10px var(--font-mono); letter-spacing:.14em; text-transform:uppercase; color: var(--fg-3); margin-bottom: 8px; display:flex; justify-content:space-between; }
.ctrl-label .val { color: var(--smc-navy-500); font-size:11px; text-transform:none; letter-spacing:0; }
.slider { width:100%; appearance: none; height: 4px; background: var(--smc-cream-300); border-radius: 2px; outline:none; }
.slider::-webkit-slider-thumb { appearance:none; width:14px; height:14px; border-radius:50%; background: var(--smc-accent-500); cursor:pointer; }
.opt { font: 11px var(--font-mono); padding: 5px 10px; background: var(--bg-elevated); border:1px solid var(--border-subtle); border-radius: var(--radius-sm); cursor:pointer; transition: 160ms; }
.opt.active { background: var(--smc-navy-500); color: var(--smc-cream); border-color: transparent; }
.ctrl-row { display:flex; gap:4px; flex-wrap:wrap; }

.cta {
  display:inline-flex; align-items:center; gap:6px;
  padding: 8px 14px; border-radius: 100px;
  background: var(--smc-navy-500); color: var(--smc-cream); border:none;
  font: 500 11px var(--font-sans); cursor:pointer; width:100%; justify-content:center;
  margin-bottom: 6px;
}
.cta.ghost { background:transparent; border:1px solid var(--smc-navy-500); color: var(--smc-navy-500); }
.cta.accent { background: var(--smc-accent-500); color: var(--smc-navy-700); }

textarea {
  width: 100%; padding: 8px 10px; border:1px solid var(--border-subtle);
  border-radius: var(--radius-sm); font: 12px var(--font-sans); resize:vertical;
  background: var(--bg-elevated); min-height:50px;
}

@media (max-width: 900px) {
  .playground { grid-template-columns: 1fr; }
  .controls { border-left:none; border-top:1px solid var(--border-subtle); }
  .stage { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(6, auto); }
}
</style>
</head>
<body>
<div class="wrap">
<header>
  <a href="../index.html" class="back">← Banco SMC v11</a>
  <h1>💬 Chat Streaming · 12 animations live</h1>
  <span class="meta">Grid 4×3 corriendo simultáneo · re-trigger por estado</span>
</header>

<div class="playground" id="pg">
  <div class="stage" id="stage"></div>

  <div class="controls">
    <div>
      <div class="ctrl-label">User prompt</div>
      <textarea id="userPrompt">¿Cuál es la capital de Chile?</textarea>
    </div>

    <div>
      <div class="ctrl-label">AI response</div>
      <textarea id="aiResponse">La capital de Chile es Santiago.</textarea>
    </div>

    <div>
      <div class="ctrl-label">Speed <span class="val" id="v-speed">35</span> ms/char</div>
      <input type="range" class="slider" id="speedSlider" min="10" max="120" value="35">
    </div>

    <div>
      <div class="ctrl-label">Loop interval <span class="val" id="v-loop">3.5</span>s</div>
      <input type="range" class="slider" id="loopSlider" min="1" max="8" step="0.5" value="3.5">
    </div>

    <div>
      <div class="ctrl-label">Modo</div>
      <div class="ctrl-row" data-ctrl="mode">
        <span class="opt active" data-val="all">todos</span>
        <span class="opt" data-val="solo">solo</span>
      </div>
    </div>

    <div>
      <div class="ctrl-label">Foco <span class="val" id="v-focus">—</span></div>
      <div class="ctrl-row" data-ctrl="focus">
        <span class="opt active" data-val="-1">(grid)</span>
        <span class="opt" data-val="0">1·pop</span>
        <span class="opt" data-val="1">2·weight</span>
        <span class="opt" data-val="2">3·fade</span>
        <span class="opt" data-val="3">4·type</span>
        <span class="opt" data-val="4">5·blur</span>
        <span class="opt" data-val="5">6·slide</span>
        <span class="opt" data-val="6">7·wave</span>
        <span class="opt" data-val="7">8·glitch</span>
        <span class="opt" data-val="8">9·grad</span>
        <span class="opt" data-val="9">10·bounce</span>
        <span class="opt" data-val="10">11·flip</span>
        <span class="opt" data-val="11">12·expand</span>
      </div>
    </div>

    <div style="margin-top:auto; padding-top:16px; border-top:1px solid var(--border-subtle);">
      <button class="cta accent" onclick="retrigger()">↻ Re-disparar todas</button>
      <button class="cta ghost" onclick="copyAnim()">📋 Copy CSS keyframes</button>
    </div>
  </div>
</div>

</div>

<script>
const ANIMATIONS = [
  { id: 'char-pop',    label: 'CHAR POP',    desc: 'scale-up cada char' },
  { id: 'weight-in',   label: 'WEIGHT IN',   desc: 'thin → bold' },
  { id: 'fade',        label: 'FADE',        desc: 'opacity 0 → 1' },
  { id: 'typewriter',  label: 'TYPEWRITER',  desc: 'clip-path + cursor' },
  { id: 'blur-in',     label: 'BLUR IN',     desc: 'blur 8px → 0' },
  { id: 'slide-up',    label: 'SLIDE UP',    desc: 'translateY 8px' },
  { id: 'wave',        label: 'WAVE',        desc: 'spring rotation' },
  { id: 'glitch',      label: 'GLITCH',      desc: 'RGB shift' },
  { id: 'gradient',    label: 'GRADIENT',    desc: 'color shift animado' },
  { id: 'bounce',      label: 'BOUNCE',      desc: 'spring scale 0 → 1' },
  { id: 'flip-y',      label: 'FLIP Y',      desc: 'rotateY 90 → 0' },
  { id: 'expand',      label: 'EXPAND',      desc: 'scaleX center' }
];

const state = new Proxy({
  prompt: '¿Cuál es la capital de Chile?',
  response: 'La capital de Chile es Santiago.',
  speed: 35,
  loop: 3.5,
  mode: 'all',
  focus: -1
}, {
  set(t, k, v) { t[k] = v; updateUI(); return true; }
});

const stage = document.getElementById('stage');

function renderGrid() {
  stage.innerHTML = '';
  if (state.focus >= 0) {
    stage.style.gridTemplateColumns = '1fr';
    stage.style.gridTemplateRows = '1fr';
    stage.appendChild(buildCell(state.focus, true));
  } else {
    stage.style.gridTemplateColumns = 'repeat(4, 1fr)';
    stage.style.gridTemplateRows = 'repeat(3, 1fr)';
    ANIMATIONS.forEach((_, i) => stage.appendChild(buildCell(i, false)));
  }
}

function buildCell(idx, expanded) {
  const anim = ANIMATIONS[idx];
  const cell = document.createElement('div');
  cell.className = 'chat-cell anim-' + anim.id;
  cell.dataset.idx = idx;
  cell.innerHTML = `
    <div class="label"><span>${anim.label}</span><span class="ix">${String(idx + 1).padStart(2, '0')}</span></div>
    <div class="msg-user">${state.prompt}</div>
    <div class="msg-ai" data-ai></div>
  `;
  if (expanded) {
    cell.style.minHeight = '450px';
    cell.style.fontSize = '1.4em';
  }
  return cell;
}

function animateCell(cell) {
  const ai = cell.querySelector('[data-ai]');
  const animId = cell.dataset.idx;
  ai.innerHTML = '';
  const text = state.response;

  if (ANIMATIONS[animId].id === 'typewriter') {
    // typewriter special handling
    const span = document.createElement('span');
    span.className = 'typed';
    span.textContent = '';
    ai.appendChild(span);
    let i = 0;
    const tw = setInterval(() => {
      span.textContent = text.slice(0, i + 1);
      span.style.setProperty('--typed-w', span.scrollWidth + 'px');
      i++;
      if (i >= text.length) clearInterval(tw);
    }, state.speed);
    return;
  }

  // char-by-char delay
  const chars = text.split('');
  chars.forEach((c, i) => {
    setTimeout(() => {
      const s = document.createElement('span');
      s.className = 'ch';
      s.textContent = c === ' ' ? ' ' : c;
      s.style.animationDelay = '0s';
      ai.appendChild(s);
    }, i * state.speed);
  });
}

function retrigger() {
  document.querySelectorAll('.chat-cell').forEach(cell => animateCell(cell));
}

let loopTimer = null;
function setupLoop() {
  if (loopTimer) clearInterval(loopTimer);
  loopTimer = setInterval(() => retrigger(), state.loop * 1000);
}

function updateUI() {
  document.getElementById('v-speed').textContent = state.speed;
  document.getElementById('v-loop').textContent = state.loop.toFixed(1);
  document.getElementById('v-focus').textContent = state.focus >= 0 ? ANIMATIONS[state.focus].label.toLowerCase() : '—';
  document.querySelectorAll('.ctrl-row').forEach(row => {
    const ctrl = row.dataset.ctrl;
    if (!ctrl) return;
    row.querySelectorAll('.opt').forEach(o => o.classList.toggle('active', o.dataset.val == state[ctrl]));
  });
  renderGrid();
  setTimeout(retrigger, 50);
  setupLoop();
}

document.querySelectorAll('.ctrl-row[data-ctrl]').forEach(row => {
  const ctrl = row.dataset.ctrl;
  row.addEventListener('click', e => {
    if (!e.target.classList.contains('opt')) return;
    let v = e.target.dataset.val;
    if (ctrl === 'focus') v = parseInt(v);
    state[ctrl] = v;
  });
});

document.getElementById('userPrompt').addEventListener('input', e => state.prompt = e.target.value);
document.getElementById('aiResponse').addEventListener('input', e => state.response = e.target.value);
document.getElementById('speedSlider').addEventListener('input', e => state.speed = parseInt(e.target.value));
document.getElementById('loopSlider').addEventListener('input', e => state.loop = parseFloat(e.target.value));

function copyAnim() {
  const focus = state.focus >= 0 ? state.focus : 0;
  const anim = ANIMATIONS[focus];
  const css = `/* SMC chat-streaming · ${anim.label} */\n.smc-chat-${anim.id} .ch {\n  display: inline-block;\n  animation: smc-${anim.id}-kf .4s var(--ease-out) forwards;\n}\n/* see playground for full keyframes */`;
  navigator.clipboard.writeText(css);
  var t=document.createElement('div');t.textContent='✓ CSS copiado · pegalo en chat-anim.css';t.style.cssText='position:fixed;bottom:24px;right:24px;padding:12px 18px;background:#1D1D1F;color:white;border-radius:12px;font:500 13px -apple-system,sans-serif;letter-spacing:-0.012em;z-index:9999;box-shadow:0 12px 32px rgba(0,0,0,.2);opacity:0;transform:translateY(8px);transition:220ms';document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1';t.style.transform='translateY(0)'});setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(8px)';setTimeout(function(){t.remove()},240)},1800);
}

// Init
renderGrid();
setTimeout(retrigger, 200);
setupLoop();
</script>
<script src="_nav.js"></script>
<script src="../_themes.js"></script>
<script src="../_auth.js"></script>
</body>
</html>
