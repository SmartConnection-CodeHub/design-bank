<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>SMC · Navy scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; }
  .ramp { display: grid; grid-template-columns: repeat(6,1fr); gap:8px; }
  .stop { border-radius: 8px; overflow: hidden; border: 1px solid var(--border-subtle); display:flex; flex-direction:column; }
  .swatch { height: 64px; }
  .info { padding: 8px 10px; background: #fff; }
  .lvl { font-weight:600; font-size:12px; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
</style></head>
<body>
<div class="ramp">
  <div class="stop"><div class="swatch" style="background:var(--smc-navy-50)"></div><div class="info"><div class="lvl">50</div><div class="hex">#EEF2F8</div></div></div>
  <div class="stop"><div class="swatch" style="background:var(--smc-navy-100)"></div><div class="info"><div class="lvl">100</div><div class="hex">#D6DEEA</div></div></div>
  <div class="stop"><div class="swatch" style="background:var(--smc-navy-300)"></div><div class="info"><div class="lvl">300</div><div class="hex">#6B7E9C</div></div></div>
  <div class="stop"><div class="swatch" style="background:var(--smc-navy-500)"></div><div class="info"><div class="lvl">500</div><div class="hex">#1B2F4E</div></div></div>
  <div class="stop"><div class="swatch" style="background:var(--smc-navy-700)"></div><div class="info"><div class="lvl">700</div><div class="hex">#131F35</div></div></div>
  <div class="stop"><div class="swatch" style="background:var(--smc-navy-900)"></div><div class="info"><div class="lvl">900</div><div class="hex">#0A1322</div></div></div>
</div>
</body></html>
