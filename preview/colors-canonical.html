<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>SMC · Color tokens (canonical)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-md); padding: 14px; border:1px solid var(--border-subtle); background: var(--bg-elevated); display:flex; flex-direction:column; gap: 8px; }
  .chip { height: 56px; border-radius: 6px; border:1px solid rgba(27,47,78,.08); }
  .meta { display:flex; justify-content: space-between; align-items: baseline; }
  .name { font-weight: 600; font-size: 13px; color: var(--fg-1); }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .role { font-size: 11px; color: var(--fg-3); letter-spacing: .04em; text-transform: uppercase; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--smc-cream)"></div><div class="meta"><span class="name">Cream</span><span class="hex">#F8F8F6</span></div><span class="role">Background base</span></div>
    <div class="sw"><div class="chip" style="background:var(--smc-navy)"></div><div class="meta"><span class="name" style="color:#fff;background:var(--smc-navy);padding:1px 6px;border-radius:4px">Navy</span><span class="hex">#1B2F4E</span></div><span class="role">Primary</span></div>
    <div class="sw"><div class="chip" style="background:var(--smc-gold)"></div><div class="meta"><span class="name">Gold</span><span class="hex">#C49A3A</span></div><span class="role">Editorial accent</span></div>
    <div class="sw"><div class="chip" style="background:var(--smc-accent)"></div><div class="meta"><span class="name">Accent</span><span class="hex">#00E5B0</span></div><span class="role">Tech green · status</span></div>
  </div>
</body></html>
