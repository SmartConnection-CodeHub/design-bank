<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>SMC · Accent + Gold scales</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; display:grid; gap: 16px; }
  .label { font-size: 11px; letter-spacing:.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; font-weight:600; }
  .ramp { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
  .stop { border-radius: 8px; overflow: hidden; border: 1px solid var(--border-subtle); }
  .sw { height: 48px; }
  .info { padding: 6px 10px; background: #fff; display:flex; justify-content:space-between; align-items:center; }
  .lvl { font-weight:600; font-size: 12px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
</style></head>
<body>
<div>
  <div class="label">Accent · tech green (status only)</div>
  <div class="ramp">
    <div class="stop"><div class="sw" style="background:var(--smc-accent-100)"></div><div class="info"><span class="lvl">100</span><span class="hex">#BDF7E5</span></div></div>
    <div class="stop"><div class="sw" style="background:var(--smc-accent-300)"></div><div class="info"><span class="lvl">300</span><span class="hex">#4DEBC4</span></div></div>
    <div class="stop"><div class="sw" style="background:var(--smc-accent-500)"></div><div class="info"><span class="lvl">500</span><span class="hex">#00E5B0</span></div></div>
    <div class="stop"><div class="sw" style="background:var(--smc-accent-700)"></div><div class="info"><span class="lvl">700</span><span class="hex">#009E78</span></div></div>
  </div>
</div>
<div>
  <div class="label">Gold · editorial accent (≤1 per screen)</div>
  <div class="ramp">
    <div class="stop"><div class="sw" style="background:var(--smc-gold-100)"></div><div class="info"><span class="lvl">100</span><span class="hex">#F4E7C3</span></div></div>
    <div class="stop"><div class="sw" style="background:var(--smc-gold-300)"></div><div class="info"><span class="lvl">300</span><span class="hex">#DCBC75</span></div></div>
    <div class="stop"><div class="sw" style="background:var(--smc-gold-500)"></div><div class="info"><span class="lvl">500</span><span class="hex">#C49A3A</span></div></div>
    <div class="stop"><div class="sw" style="background:var(--smc-gold-700)"></div><div class="info"><span class="lvl">700</span><span class="hex">#8A6B23</span></div></div>
  </div>
</div>
</body></html>
